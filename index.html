<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday 🎂</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
      font-family: Arial, sans-serif;
    }

    /* Floating balloons */
    .balloon {
      position: absolute;
      bottom: -150px;
      width: 60px;
      height: 80px;
      border-radius: 50%;
      animation: float 10s infinite ease-in;
      opacity: 0.8;
    }

    .balloon::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 60px;
      background: #555;
      left: 50%;
      top: 80px;
    }

    @keyframes float {
      0% {
        transform: translateY(0) rotate(0deg);
      }
      100% {
        transform: translateY(-120vh) rotate(360deg);
      }
    }

    /* Glow animation */
    .glow {
      animation: glow 1.5s infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 10px #ff4da6;
      }
      to {
        text-shadow: 0 0 25px #ff1a75;
      }
    }

    /* Fade animation */
    .fade-in {
      animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen px-4">

  <!-- Balloons -->
  <div class="balloon bg-pink-400 left-[10%]" style="animation-duration:8s;"></div>
  <div class="balloon bg-yellow-400 left-[30%]" style="animation-duration:10s;"></div>
  <div class="balloon bg-blue-400 left-[50%]" style="animation-duration:7s;"></div>
  <div class="balloon bg-green-400 left-[70%]" style="animation-duration:11s;"></div>
  <div class="balloon bg-purple-400 left-[90%]" style="animation-duration:9s;"></div>

  <!-- Main Card -->
  <div class="bg-white/90 backdrop-blur-md shadow-2xl rounded-3xl p-8 max-w-md w-full text-center z-10 fade-in">

    <h1 class="text-4xl sm:text-5xl font-extrabold text-pink-500 mb-4 glow">
      🎂 Happy Birthday 🎂
    </h1>

    <p id="typing" class="text-gray-700 text-lg leading-relaxed min-h-[100px]"></p>

    <div class="text-6xl my-6 animate-bounce">
      🎉🎈🎁
    </div>

    <button onclick="celebrate()"
      class="mt-4 px-6 py-3 bg-pink-500 hover:bg-pink-600 text-white rounded-full shadow-lg hover:scale-105 transition duration-300">
      Click for Surprise 🎊
    </button>

    <p id="surprise"
      class="hidden mt-5 text-xl font-bold text-purple-600 fade-in">
      You are amazing! 💖 Have the best birthday ever!
    </p>
  </div>

  <!-- Background Music -->
  <audio id="music" autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <script>
    // Typing effect
    const text =
      "Wishing you endless happiness, success, laughter, and unforgettable memories on your special day! ✨";

    let i = 0;

    function typingEffect() {
      if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typingEffect, 40);
      }
    }

    typingEffect();

    // Confetti on load
    window.onload = () => {
      confetti({
        particleCount: 200,
        spread: 120,
        origin: { y: 0.6 }
      });
    };

    // Surprise button
    function celebrate() {
      document.getElementById("surprise").classList.remove("hidden");

      confetti({
        particleCount: 300,
        spread: 150,
        origin: { y: 0.6 }
      });

      setTimeout(() => {
        confetti({
          particleCount: 150,
          angle: 60,
          spread: 100,
          origin: { x: 0 }
        });

        confetti({
          particleCount: 150,
          angle: 120,
          spread: 100,
          origin: { x: 1 }
        });
      }, 500);
    }
  </script>

</body>
</html>
